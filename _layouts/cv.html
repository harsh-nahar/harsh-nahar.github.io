<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV — {{ page.title }}</title>
    <style>
        /* 1. RESET */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* 2. BASE SETTINGS (The "Paper" Feel) */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-size: 14px; /* Standard print size */
            line-height: 1.5;
            color: #333;
            background: #f0f0f0; /* Gray background for browser */
            padding: 20px;
        }

        /* The Sheet of Paper */
        .cv-sheet {
            background: white;
            max-width: 21cm; /* A4 Width */
            margin: 0 auto;
            padding: 2cm; /* Standard 1-inch margins */
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* 3. MARKDOWN MAPPING */
        
        /* Name (H1) */
        h1 {
            font-size: 24px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
            color: #000;
        }

        /* The "Developer • Designer" line */
        h1 + p {
            margin-bottom: 20px;
            font-size: 14px;
            color: #555;
        }

        /* Section Headers (H2) */
        h2 {
            font-size: 16px;
            text-transform: uppercase;
            font-weight: 700;
            border-bottom: 2px solid #333; /* The classic line */
            margin-top: 25px;
            margin-bottom: 15px;
            padding-bottom: 3px;
            letter-spacing: 0.5px;
        }

        /* Job Titles (H3) */
        h3 {
            font-size: 15px;
            font-weight: 700;
            margin-top: 15px;
            margin-bottom: 2px;
            color: #000;
        }

        /* Paragraphs (Companies/Dates) */
        p {
            margin-bottom: 8px;
        }
        
        /* Bold text (Companies) */
        strong {
            font-weight: 600;
            color: #111;
        }

        /* Links */
        a { color: #333; text-decoration: underline; }
        
        /* Lists (Bullet points) */
        ul {
            margin-bottom: 10px;
            padding-left: 20px;
        }
        li {
            margin-bottom: 2px;
        }
        
        /* Horizontal Rule (Divider) */
        hr {
            border: 0;
            border-top: 1px solid #ddd;
            margin: 20px 0;
        }

        /* 4. PRINT OVERRIDES (Clean Paper) */
        @media print {
            body { background: white; padding: 0; }
            .cv-sheet { 
                box-shadow: none; 
                margin: 0; 
                padding: 0; 
                width: 100%; 
                max-width: none;
            }
            /* Hide URL strings on print */
            a[href]:after { content: none !important; }
        }
    </style>
</head>
<body>
    <div class="cv-sheet">
        {{ content }}
    </div>
</body>
</html>
